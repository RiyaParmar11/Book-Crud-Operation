<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Book Management</title>
</head>

<body class="bg-gradient-to-br from-slate-100 via-blue-50 to-indigo-100 min-h-screen">

    <div class="max-w-7xl mx-auto px-6 py-10">

        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold text-gray-800">
                    📚 Book Management
                </h1>
                <p class="text-gray-500 mt-2">
                    Manage your collection with ease.
                </p>
            </div>

            <a href="/add"
                class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl shadow-lg transition duration-300">
                + Add Book
            </a>
        </div>

        <!-- Table Card -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">

            <table class="w-full">

                <thead class="bg-indigo-600 text-white">

                    <tr>
                        <th class="py-4 px-6 text-left">Book Name</th>
                        <th class="py-4 px-6 text-left">Author</th>
                        <th class="py-4 px-6 text-left">Year</th>
                        <th class="py-4 px-6 text-center">Actions</th>
                    </tr>

                </thead>

                <tbody>

                    {% for i in book %}

                    <tr class="border-b hover:bg-indigo-50 transition">

                        <td class="py-4 px-6 font-medium text-gray-800">
                            {{ i.name }}
                        </td>

                        <td class="py-4 px-6 text-gray-600">
                            {{ i.author }}
                        </td>

                        <td class="py-4 px-6 text-gray-600">
                            {{ i.Year }}
                        </td>

                        <td class="py-4 px-6">

                            <div class="flex justify-center gap-3">

                                <a href="show/{{i.id}}"
                                    class="bg-sky-500 hover:bg-sky-600 text-white px-4 py-2 rounded-lg shadow transition">
                                    View
                                </a>

                                <a href="update/{{i.id}}"
                                    class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-lg shadow transition">
                                    Update
                                </a>

                                <a href="delete/{{i.id}}"
                                    onclick="return confirm('Are you sure you want to delete this book?')"
                                    class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg shadow transition">
                                    Delete
                                </a>

                            </div>

                        </td>

                    </tr>

                    {% empty %}

                    <tr>
                        <td colspan="4" class="py-12 text-center text-gray-500 text-lg">
                            📖 No books available.
                        </td>
                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</body>
</html>
