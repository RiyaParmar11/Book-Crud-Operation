<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Update Book</title>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-100 via-blue-50 to-indigo-100 flex items-center justify-center">

    <div class="w-full max-w-lg px-6">

        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">

            <!-- Header -->
            <div class="bg-indigo-600 py-6">
                <h1 class="text-3xl font-bold text-center text-white">
                    ✏️ Update Book
                </h1>
                <p class="text-center text-indigo-100 mt-2">
                    Modify the book information below.
                </p>
            </div>

            <!-- Form -->
            <div class="p-8">

                <form method="post" class="space-y-6">

                    {% csrf_token %}

                    <!-- Book Name -->
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">
                            Book Name
                        </label>

                        <input
                            type="text"
                            name="name"
                            value="{{ book.name }}"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
                            required
                        >
                    </div>

                    <!-- Author -->
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">
                            Author
                        </label>

                        <input
                            type="text"
                            name="author"
                            value="{{ book.author }}"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
                            required
                        >
                    </div>

                    <!-- Publication Year -->
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">
                            Publication Year
                        </label>

                        <input
                            type="number"
                            name="year"
                            value="{{ book.Year }}"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
                            required
                        >
                    </div>

                    <!-- Buttons -->
                    <div class="flex gap-4 pt-4">

                        <button
                            type="submit"
                            class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-semibold shadow-lg transition duration-300">
                            💾 Update Book
                        </button>

                        <a
                            href="/"
                            class="flex-1 text-center bg-gray-200 hover:bg-gray-300 text-gray-700 py-3 rounded-xl font-semibold transition duration-300">
                            Cancel
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</body>
</html>
