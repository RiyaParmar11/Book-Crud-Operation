<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Book Details</title>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-100 via-blue-50 to-indigo-100 flex items-center justify-center">

    <div class="w-full max-w-xl">

        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">

            <!-- Header -->
            <div class="bg-indigo-600 py-6">
                <h1 class="text-3xl font-bold text-white text-center">
                    📖 Book Details
                </h1>
                <p class="text-indigo-100 text-center mt-2">
                    Complete information about the selected book
                </p>
            </div>

            <!-- Details -->
            <div class="p-8">

                <table class="w-full border border-gray-200 rounded-lg overflow-hidden">

                    <tbody>

                        <tr class="border-b hover:bg-gray-50 transition">
                            <th class="w-1/3 bg-gray-100 text-left px-6 py-4 font-semibold text-gray-700">
                                Book Name
                            </th>
                            <td class="px-6 py-4 text-gray-800">
                                {{ book.name }}
                            </td>
                        </tr>

                        <tr class="border-b hover:bg-gray-50 transition">
                            <th class="bg-gray-100 text-left px-6 py-4 font-semibold text-gray-700">
                                Author
                            </th>
                            <td class="px-6 py-4 text-gray-800">
                                {{ book.author }}
                            </td>
                        </tr>

                        <tr class="hover:bg-gray-50 transition">
                            <th class="bg-gray-100 text-left px-6 py-4 font-semibold text-gray-700">
                                Publication Year
                            </th>
                            <td class="px-6 py-4 text-gray-800">
                                {{ book.Year }}
                            </td>
                        </tr>

                    </tbody>

                </table>

                <!-- Buttons -->
                <div class="mt-8 flex justify-center gap-4">

                    <a href="/"
                        class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl shadow-lg transition duration-300">
                        ← Back to List
                    </a>

                    <a href="/update/{{ book.id }}"
                        class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-3 rounded-xl shadow-lg transition duration-300">
                        ✏ Edit
                    </a>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
